# .github/workflows/adsterra-telegram-bot.yml
name: Adsterra Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'  # Runs daily at 5 AM UTC (optional)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-telegram-bot==20.7 python-dotenv
          playwright install --with-deps chromium

      - name: Run Telegram Bot with Adsterra Automation
        run: python Adsterra.py
