# ================================================================
#        ADSTERRA BOT — GITHUB ACTIONS 24/7 DEPLOYMENT
# ================================================================
name: 🤖 Adsterra Bot

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: adsterra-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ✅ Syntax Check
        run: |
          python -m py_compile Adsterra.py
          echo "✅ Syntax OK"

  # ──────────────────────────────────────────────────────────────
  run-bot:
    name: 🚀 Run Bot
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🛠️ System Dependencies
        run: |
          sudo apt-get update -qq

          # ── Detect Ubuntu version ──────────────────────────
          UBUNTU_VERSION=$(lsb_release -rs)
          echo "Ubuntu version: $UBUNTU_VERSION"

          # ── Base packages (work on all Ubuntu versions) ────
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libxrandr2 \
            libgtk-3-0 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgcc-s1 \
            libglib2.0-0 \
            libnspr4 \
            libstdc++6 \
            libx11-6 \
            libxcb1 \
            libxext6 \
            libxfixes3 \
            wget \
            ca-certificates \
            fonts-liberation \
            xdg-utils

          # ── libasound2 — renamed in Ubuntu 24.04 ──────────
          if dpkg -l libasound2t64 2>/dev/null | grep -q "^ii"; then
            echo "✅ libasound2t64 already installed"
          elif apt-cache show libasound2t64 2>/dev/null | grep -q "Package:"; then
            sudo apt-get install -y --no-install-recommends libasound2t64
            echo "✅ Installed libasound2t64 (Ubuntu 24.04+)"
          elif apt-cache show libasound2 2>/dev/null | grep -q "Package:"; then
            sudo apt-get install -y --no-install-recommends libasound2
            echo "✅ Installed libasound2 (Ubuntu <24.04)"
          else
            echo "⚠️ Neither libasound2 nor libasound2t64 found — skipping"
          fi

          # ── libatk1.0-0 — also renamed in some versions ───
          if apt-cache show libatk1.0-0t64 2>/dev/null | grep -q "Package:"; then
            sudo apt-get install -y --no-install-recommends libatk1.0-0t64
            echo "✅ Installed libatk1.0-0t64"
          elif apt-cache show libatk1.0-0 2>/dev/null | grep -q "Package:"; then
            sudo apt-get install -y --no-install-recommends libatk1.0-0
            echo "✅ Installed libatk1.0-0"
          fi

          echo "✅ All system dependencies installed"

      - name: 📦 Install Python Packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium
        run: |
          # Let Playwright install its own bundled Chromium
          # which includes all needed libs internally
          playwright install chromium --with-deps
          echo "✅ Playwright Chromium installed"

      - name: ✅ Verify Installation
        run: |
          python -c "import playwright; print('✅ Playwright OK')"
          python -c "import telegram; print('✅ python-telegram-bot OK')"
          python -m py_compile Adsterra.py
          echo "✅ All checks passed"

      - name: 🤖 Run Bot
        run: python adsterra_bot.py

      - name: 📋 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 5

  # ──────────────────────────────────────────────────────────────
  restart:
    name: 🔄 Auto Restart
    runs-on: ubuntu-latest
    needs: run-bot
    if: always()
    steps:
      - name: 🔄 Trigger Next Run
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "✅ Restart triggered"
