# ================================================================
#        ADSTERRA BOT — GITHUB ACTIONS 24/7 DEPLOYMENT
# ================================================================
name: 🤖 Adsterra Bot

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: adsterra-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  #  SYNTAX CHECK
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ✅ Check Syntax
        run: |
          python -m py_compile Adsterra.py
          echo "✅ Syntax OK"

  # ──────────────────────────────────────────────────────────────
  #  RUN BOT
  # ──────────────────────────────────────────────────────────────
  run-bot:
    name: 🚀 Run Bot
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 🛠️ System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libgbm1 libasound2 \
            libxrandr2 libgtk-3-0 wget ca-certificates

      - name: 📦 Install Python Packages
        run: |
          pip install --upgrade pip
          pip install \
            playwright==1.47.0 \
            python-telegram-bot==21.6

      - name: 🌐 Install Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🤖 Run Adsterra Bot
        run: python Adsterra.py

      - name: 📋 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 5

  # ──────────────────────────────────────────────────────────────
  #  AUTO RESTART AFTER 6H LIMIT
  # ──────────────────────────────────────────────────────────────
  restart:
    name: 🔄 Auto Restart
    runs-on: ubuntu-latest
    needs: run-bot
    if: always()
    steps:
      - name: 🔄 Trigger Next Run
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "✅ Restart triggered"
